name: Notify Slack about merged PRs missing production release labels

on:
  schedule:
    - cron: "0 8 * * *" # daily 08:00 UTC (09:00 DK winter time, 10:00 DK summer time)
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Find merged PRs missing production release labels
        id: find
        uses: actions/github-script@v7
        env:
          TARGET_BRANCH: ${{ vars.TARGET_BRANCH }}
          CREATED_AFTER: ${{ vars.CREATED_AFTER }}
          MERGED_DAYS_AGO: ${{ vars.MERGED_DAYS_AGO }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const LABEL_TESTED = "production release tested";
            const LABEL_NO_IMPACT = "production release no impact";

            const TARGET_BRANCH = (process.env.TARGET_BRANCH || "main").trim();
            const CREATED_AFTER = (process.env.CREATED_AFTER || "2025-12-03").trim();

            // Parse MERGED_DAYS_AGO safely (default 7)
            const mergedDaysAgoRaw = (process.env.MERGED_DAYS_AGO || "7").trim();
            const MERGED_DAYS_AGO = Number.parseInt(mergedDaysAgoRaw, 10);
            if (!Number.isFinite(MERGED_DAYS_AGO) || MERGED_DAYS_AGO < 0) {
              throw new Error(`Invalid MERGED_DAYS_AGO value: "${mergedDaysAgoRaw}"`);
            }

            // cutoff date for merged:< (older than MERGED_DAYS_AGO days)
            const cutoff = new Date(Date.now() - MERGED_DAYS_AGO * 24 * 60 * 60 * 1000);
            const yyyy = cutoff.getUTCFullYear();
            const mm = String(cutoff.getUTCMonth() + 1).padStart(2, "0");
            const dd = String(cutoff.getUTCDate()).padStart(2, "0");
            const mergedBefore = `${yyyy}-${mm}-${dd}`;

            // GitHub search query:
            // - merged PRs targeting TARGET_BRANCH
            // - created after CREATED_AFTER
            // - merged before mergedBefore (=> merged more than MERGED_DAYS_AGO days ago)
            // - missing BOTH labels: "tested" and "no impact"
            const q = [
              `repo:${owner}/${repo}`,
              `is:pr`,
              `is:merged`,
              `base:${TARGET_BRANCH}`,
              `created:>${CREATED_AFTER}`,
              `merged:<${mergedBefore}`,
              `-label:"${LABEL_TESTED}"`,
              `-label:"${LABEL_NO_IMPACT}"`
            ].join(" ");

            core.info(`Search query: ${q}`);

            const results = [];
            let page = 1;

            while (true) {
              const resp = await github.rest.search.issuesAndPullRequests({
                q,
                per_page: 100,
                page
              });

              for (const item of resp.data.items) {
                if (!item.pull_request) continue;

                const labels = (item.labels || []).map(l => (typeof l === "string" ? l : l.name));

                // Extra guards (even though the query already excludes them)
                if (labels.includes(LABEL_TESTED)) continue;
                if (labels.includes(LABEL_NO_IMPACT)) continue;

                results.push({
                  number: item.number,
                  title: item.title,
                  url: item.html_url,
                  author: item.user?.login ?? "unknown",
                  merged_at: item.closed_at
                });
              }

              if (resp.data.items.length < 100) break;
              page++;
              if (page > 10) break; // fail-safe
            }

            core.info(`Found ${results.length} PR(s)`);

            core.setOutput("count", String(results.length));
            core.setOutput("prs_json", JSON.stringify(results));
            core.setOutput("merged_before", mergedBefore);
            core.setOutput("target_branch", TARGET_BRANCH);
            core.setOutput("created_after", CREATED_AFTER);
            core.setOutput("merged_days_ago", String(MERGED_DAYS_AGO));

      - name: Build Slack payload (valid JSON)
        id: slack
        if: steps.find.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const prs = JSON.parse(`${{ steps.find.outputs.prs_json }}`);
            const targetBranch = `${{ steps.find.outputs.target_branch }}`;
            const createdAfter = `${{ steps.find.outputs.created_after }}`;
            const mergedDaysAgo = `${{ steps.find.outputs.merged_days_ago }}`;

            const labelTested = "production release tested";
            const labelNoImpact = "production release no impact";

            const lines = prs.slice(0, 50).map(pr =>
              `• <${pr.url}|#${pr.number}> — ${pr.title} (by ${pr.author})`
            );

            let text =
              `:warning: *PR’er targeting \`${targetBranch}\` oprettet efter ${createdAfter} som har været merged i > ${mergedDaysAgo} dage og mangler label \`${labelTested}\`* ` +
              `(og er ikke markeret som \`${labelNoImpact}\`)\n` +
              lines.join("\n");

            if (prs.length > 50) {
              text += `\n…og ${prs.length - 50} flere (viser max 50).`;
            }

            // Important: always output VALID JSON (proper escaping for quotes/newlines)
            const payload = JSON.stringify({ text });
            core.setOutput("payload", payload);

      - name: Send to Slack (webhook)
        if: steps.find.outputs.count != '0'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: ${{ steps.slack.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_KIT_HOSTING_GITHUB }}
