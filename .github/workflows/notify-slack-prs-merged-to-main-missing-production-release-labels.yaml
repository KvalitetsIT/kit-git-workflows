name: Notify Slack about merged PRs missing production release labels (reusable)
# ------------------------------------------------------------------------------------
# Slack reminder: merged PRs missing production-release labels
#
# Get started (per repo)
#
# 1) Add Actions variables
#    GitHub → Repo → Settings → Secrets and variables → Actions → Variables → New repository variable
#      - TARGET_BRANCH = main (or whatever your repo uses)
#      - (optional) CREATED_AFTER = 2025-12-03 (YYYY-MM-DD)
#      - (optional) MERGED_DAYS_AGO = 7 (integer)
#      - (optional) LABEL_TESTED = production release tested
#      - (optional) LABEL_NO_IMPACT = production release no impact
#
# 2) Add Slack webhook secret
#    GitHub → Repo → Settings → Secrets and variables → Actions → Secrets → New repository secret
#      - SLACK_WEBHOOK_URL_KIT_HOSTING_GITHUB = <your Slack Incoming Webhook URL>
#
# What it does (conditions)
# - Runs on schedule (and manual run)
# - Searches for PRs that are:
#     - Merged
#     - Targeting TARGET_BRANCH (base branch)
#     - Created after CREATED_AFTER
#     - Merged more than MERGED_DAYS_AGO days ago
#     - Missing label LABEL_TESTED (default: "production release tested")
#     - And also missing label LABEL_NO_IMPACT (default: "production release no impact")
# - Posts matching PRs as clickable links to Slack via the webhook
# ------------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      target_branch:
        description: "Base/target branch to check (e.g. main/master/release)"
        type: string
        required: false
        default: "main"
      created_after:
        description: "Only include PRs created after this date (YYYY-MM-DD)"
        type: string
        required: false
        default: "2025-12-03"
      merged_days_ago:
        description: "Only include PRs merged more than this many days ago"
        type: number
        required: false
        default: 7
      label_tested:
        description: "Label indicating production release has been tested"
        type: string
        required: false
        default: "production release tested"
      label_no_impact:
        description: "Label indicating production release has no production impact"
        type: string
        required: false
        default: "production release no impact"
    secrets:
      SLACK_WEBHOOK_URL:
        description: "Slack Incoming Webhook URL"
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Find merged PRs missing production release labels
        id: find
        uses: actions/github-script@v7
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          CREATED_AFTER: ${{ inputs.created_after }}
          MERGED_DAYS_AGO: ${{ inputs.merged_days_ago }}
          LABEL_TESTED: ${{ inputs.label_tested }}
          LABEL_NO_IMPACT: ${{ inputs.label_no_impact }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Read inputs via env (single source inside JS)
            const TARGET_BRANCH = (process.env.TARGET_BRANCH || "main").trim();
            const CREATED_AFTER = (process.env.CREATED_AFTER || "2025-12-03").trim();
            const LABEL_TESTED = (process.env.LABEL_TESTED || "production release tested").trim();
            const LABEL_NO_IMPACT = (process.env.LABEL_NO_IMPACT || "production release no impact").trim();

            const mergedDaysAgoRaw = (process.env.MERGED_DAYS_AGO || "7").trim();
            const MERGED_DAYS_AGO = Number.parseInt(mergedDaysAgoRaw, 10);

            // cutoff date for merged:< (older than MERGED_DAYS_AGO days)
            const cutoff = new Date(Date.now() - MERGED_DAYS_AGO * 24 * 60 * 60 * 1000);
            const yyyy = cutoff.getUTCFullYear();
            const mm = String(cutoff.getUTCMonth() + 1).padStart(2, "0");
            const dd = String(cutoff.getUTCDate()).padStart(2, "0");
            const mergedBefore = `${yyyy}-${mm}-${dd}`;

            const q = [
              `repo:${owner}/${repo}`,
              `is:pr`,
              `is:merged`,
              `base:${TARGET_BRANCH}`,
              `created:>${CREATED_AFTER}`,
              `merged:<${mergedBefore}`,
              `-label:"${LABEL_TESTED}"`,
              `-label:"${LABEL_NO_IMPACT}"`
            ].join(" ");

            core.info(`Search query: ${q}`);

            const results = [];
            const MAX_PAGES = 10;

            for (let page = 1; page <= MAX_PAGES; page++) {
              const resp = await github.rest.search.issuesAndPullRequests({
                q,
                per_page: 100,
                page
              });

              const items = resp.data.items || [];

              for (const item of items) {
                if (!item.pull_request) continue;

                const labels = (item.labels || []).map(l => (typeof l === "string" ? l : l.name));

                // Extra guards (even though the query excludes them)
                if (labels.includes(LABEL_TESTED)) continue;
                if (labels.includes(LABEL_NO_IMPACT)) continue;

                results.push({
                  number: item.number,
                  title: item.title,
                  url: item.html_url,
                  author: item.user?.login ?? "unknown",
                  merged_at: item.closed_at
                });
              }

              // Stop when fewer than 100 results => no more pages
              if (items.length < 100) break;
            }

            core.info(`Found ${results.length} PR(s)`);

            core.setOutput("count", String(results.length));
            core.setOutput("prs_json", JSON.stringify(results));

            core.setOutput("target_branch", TARGET_BRANCH);
            core.setOutput("created_after", CREATED_AFTER);
            core.setOutput("merged_days_ago", String(MERGED_DAYS_AGO));
            core.setOutput("label_tested", LABEL_TESTED);
            core.setOutput("label_no_impact", LABEL_NO_IMPACT);

      - name: Build Slack payload (valid JSON)
        id: slack
        if: steps.find.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            // >>> GitHub username -> Slack user ID map (edit this)
            // Copy/paste a line to add a user:
            //   "githubUser": "U0123ABC456",
            const GH_TO_SLACK = {
              "mbirchdk": "U020L9U4E1J",
              "fkokit": "U09CJU6QT6Z",
              "bork91": "U013QNWS8KA",
              "henrikmagni": "U0359KM0F41",
              "luxass": "U09QALE55K8",
              "orehoj": "U3F0D3F2L",
              "JonasPed": "UEH3NQQTB",
              "sunekochhansen": "U87KFM6HW",
              "MikkelLambaekKIT": "U071ZET4P96",
              "Batterihane": "U01T61QKJHL",
              "evtr": "U0WQJ8CK0"
            };
            // <<<

            const prs = JSON.parse(`${{ steps.find.outputs.prs_json }}`);

            const targetBranch = `${{ steps.find.outputs.target_branch }}`;
            const createdAfter = `${{ steps.find.outputs.created_after }}`;
            const mergedDaysAgo = `${{ steps.find.outputs.merged_days_ago }}`;
            const labelTested = `${{ steps.find.outputs.label_tested }}`;
            const labelNoImpact = `${{ steps.find.outputs.label_no_impact }}`;

            function mentionFor(githubLogin) {
              const slackId = GH_TO_SLACK[githubLogin];
              return slackId ? `<@${slackId}>` : `@${githubLogin}`;
            }

            const lines = prs.slice(0, 50).map(pr => {
              const gh = pr.author || "unknown";
              const mention = mentionFor(gh);
              // Slack link-format uden <...> wrapper (som i dit eksempel)
              return `• <${pr.url}|#${pr.number}> — ${pr.title} (by ${gh}) ${mention}`;
            });

            let text =
              `:warning: *${context.repo.owner}/${context.repo.repo} — PR’er til ${targetBranch}.*\n` +
              `PR’s ændringer kan potentielt være kommet i produktions-miljøet, så der skal tages stilling til label: ` +
              `\`${labelTested}\` eller \`${labelNoImpact}\`\n` +
              lines.join("\n");

            if (prs.length > 50) {
              text += `\n…og ${prs.length - 50} flere (viser max 50).`;
            }

            core.setOutput("payload", JSON.stringify({ text }));

      - name: Send to Slack (webhook)
        if: steps.find.outputs.count != '0'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: ${{ steps.slack.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
