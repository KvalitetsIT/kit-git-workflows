name: Helm PR

on:
  workflow_call:
    inputs:
      helm_version:
        description: "Helm version to install"
        type: string
        required: false
        default: "v3.17.0"
      python_version:
        description: "Python version to install"
        type: string
        required: false
        default: "3.x"
      ct_config:
        description: "Path to chart-testing config file"
        type: string
        required: false
        default: "ct.yaml"
      crd_urls:
        description: "Newline-separated list of CRD manifest URLs to install before chart testing"
        type: string
        required: false
        default: ""
      namespaces:
        description: "Newline-separated list of namespaces to create before chart testing"
        type: string
        required: false
        default: ""

permissions: {}

jobs:
  lint-test:
    name: Helm Lint & Test
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-helm-lint-test-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ inputs.helm_version }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        env:
          CT_CONFIG: ${{ inputs.ct_config }}
        run: |
          changed=$(ct list-changed --config "$CT_CONFIG")
          echo "Changed charts:"
          echo "$changed"

          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        env:
          CT_CONFIG: ${{ inputs.ct_config }}
        run: ct lint --config "$CT_CONFIG"

      - name: Kubernetes KinD Cluster
        id: kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Install CRDs
        if: steps.list-changed.outputs.changed == 'true' && inputs.crd_urls != ''
        env:
          CRD_URLS: ${{ inputs.crd_urls }}
        run: |
          wait_for_crd() {
            local crd="$1"
            kubectl wait --for=condition=Established --timeout=60s "crd/${crd}" \
              || kubectl wait --for=condition=Established --timeout=60s "crd/${crd}"
          }

          while IFS= read -r url; do
            [[ -z "$url" ]] && continue
            output=$(kubectl apply -f "$url")
            echo "$output"
            crd_name=$(echo "$output" | grep -oP 'customresourcedefinition\.apiextensions\.k8s\.io/\K[^ ]+')
            if [[ -n "$crd_name" ]]; then
              wait_for_crd "$crd_name"
            fi
          done <<< "$CRD_URLS"

      - name: Create namespaces
        if: steps.list-changed.outputs.changed == 'true' && inputs.namespaces != ''
        env:
          NAMESPACES: ${{ inputs.namespaces }}
        run: |
          while IFS= read -r ns; do
            [[ -z "$ns" ]] && continue
            kubectl create namespace "$ns" 2>/dev/null || kubectl get namespace "$ns" >/dev/null
          done <<< "$NAMESPACES"

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CT_CONFIG: ${{ inputs.ct_config }}
        run: |
          ct install --config "$CT_CONFIG"
