name: PR Body Validation (Reusable)
# Validates PR description quality gates:
# - Required text blocks: If <!-- required-text-start -->...<!-- required-text-end --> blocks exist, each must be non-empty
#   - If no blocks exist, the check passes
#   - Fails on unbalanced tags (start without end or end without start)
# - Checklist: Fails if the PR checklist contains any unchecked tasks (via task-completed-checker)


on:
  workflow_call:
    inputs:
      start_tag:
        type: string
        required: false
        default: "<!-- required-text-start -->"
      end_tag:
        type: string
        required: false
        default: "<!-- required-text-end -->"
      min_length:
        type: number
        required: false
        default: 10

permissions:
  pull-requests: read # Required to read pull request body for validation

jobs:
  required-text-check:
    name: Required Text Validation
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-required-text-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Fail if required-text region is empty
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          START_TAG: ${{ inputs.start_tag }}
          END_TAG: ${{ inputs.end_tag }}
          MIN_LENGTH: ${{ inputs.min_length }}
        with:
          script: |
            const body = context.payload.pull_request?.body || "";
            const startTag = process.env.START_TAG;
            const endTag   = process.env.END_TAG;
            const minLen   = Math.max(1, Number(process.env.MIN_LENGTH) || 1);

            const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

            if (body.includes(startTag) && !body.includes(endTag))
              return core.setFailed("Found required-text-start but no required-text-end.");
            if (body.includes(endTag) && !body.includes(startTag))
              return core.setFailed("Found required-text-end but no required-text-start.");

            const re = new RegExp(`${esc(startTag)}([\\s\\S]*?)${esc(endTag)}`, "g");
            const matches = [...body.matchAll(re)];
            if (matches.length === 0) return;

            const bad = matches.filter(m => ((m[1] || "").replace(/\s+/g, "")).length < minLen).length;
            if (bad) core.setFailed(`${bad} required-text block(s) are empty. Fill in text between the tags.`);

  checklist-check:
    name: Checklist Validation
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-checklist-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Fail if checklist has unchecked items
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const body = context.payload.pull_request?.body || "";
            const cleaned = body.replace(/<!-- ignore-task-list-start -->[\s\S]*?<!-- ignore-task-list-end -->/g, "");
            const unchecked = (cleaned.match(/^\s*-\s*\[\s*\]\s+/gm) || []).length;
            if (unchecked) core.setFailed(`${unchecked} unchecked checklist item(s) found in PR description.`);
