name: Argo CD Diff Preview (reusable)
# ------------------------------------------------------------------------------------
# Argo CD diff preview for pull requests
#
# Simple usage (per repo)
#
# 1) Call this reusable workflow from a workflow triggered by pull_request
# 2) Provide app_path (folder with manifests or App-of-Apps Helm chart)
# 3) Optionally provide env_value_file (e.g. values-prod.yaml)
#
# What it does
# - Checks out:
#     - base branch (base_ref) into ./main
#     - pull request merge ref into ./pull-request
# - Auto-detects mode:
#     - Helm App-of-Apps (Chart.yaml exists at app_path): renders chart in both branches
#     - Manifests folder: scans YAML files under app_path
# - Creates Argo CD repo-creds secret manifest in ./secrets for private repo access
# - Runs dagandersen/argocd-diff-preview and writes markdown output to ./output/diff.md
# - Creates or updates a PR comment with the diff markdown
# ------------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      app_path:
        description: "Path to app manifests folder or App-of-Apps Helm chart (e.g. deployment/apps/infrastructure)"
        required: true
        type: string
      env_value_file:
        description: "Optional extra Helm values file (e.g. values-prod.yaml)"
        required: false
        type: string
        default: ""
      base_ref:
        description: "Base branch ref used for comparison"
        required: false
        type: string
        default: "main"
    secrets:
      repo_read_token:
        description: "Optional token with read access to repo for private git/helm resources"
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(context.payload.pull_request?.number) || 0;

            if (!prNumber) {
              core.setFailed(
                "No pull request number found. Run from a pull_request-triggered caller workflow."
              );
              return;
            }

            const targetRef = `refs/pull/${prNumber}/merge`;
            const repository = `${context.repo.owner}/${context.repo.repo}`;

            core.setOutput("pr_number", String(prNumber));
            core.setOutput("target_ref", targetRef);
            core.setOutput("repository", repository);

      - name: Checkout pull request merge ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.target_ref }}
          path: pull-request

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_ref }}
          path: main

      - name: Resolve app mode and file filter
        id: app
        env:
          APP_PATH_INPUT: ${{ inputs.app_path }}
        run: |
          set -euo pipefail

          APP_PATH="${APP_PATH_INPUT#/}"
          APP_PATH="${APP_PATH%/}"

          if [ -z "${APP_PATH}" ]; then
            echo "Input app_path must not be empty"
            exit 1
          fi

          MAIN_PATH="${GITHUB_WORKSPACE}/main/${APP_PATH}"
          PR_PATH="${GITHUB_WORKSPACE}/pull-request/${APP_PATH}"

          if [ ! -e "${MAIN_PATH}" ]; then
            echo "app_path not found in base branch checkout: ${APP_PATH}"
            exit 1
          fi

          if [ ! -e "${PR_PATH}" ]; then
            echo "app_path not found in pull-request checkout: ${APP_PATH}"
            exit 1
          fi

          echo "app_path=${APP_PATH}" >> "$GITHUB_OUTPUT"

          if [ -f "${MAIN_PATH}/Chart.yaml" ] && [ -f "${PR_PATH}/Chart.yaml" ]; then
            echo "mode=helm" >> "$GITHUB_OUTPUT"
            echo "file_regex=^\\.argocd-diff-preview/rendered-applications\\.yaml$" >> "$GITHUB_OUTPUT"
            echo "Detected App-of-Apps Helm chart at ${APP_PATH}"
          else
            if [ ! -d "${MAIN_PATH}" ] || [ ! -d "${PR_PATH}" ]; then
              echo "Expected a directory at app_path for manifest mode: ${APP_PATH}"
              exit 1
            fi

            ESCAPED_APP_PATH="$(printf '%s' "${APP_PATH}" | sed -e 's/[][(){}.^$*+?|\\]/\\&/g')"
            echo "mode=manifests" >> "$GITHUB_OUTPUT"
            echo "file_regex=^${ESCAPED_APP_PATH}/.*\\.ya?ml$" >> "$GITHUB_OUTPUT"
            echo "Detected manifest folder mode under ${APP_PATH}"
          fi

      - name: Setup Helm
        if: steps.app.outputs.mode == 'helm'
        uses: azure/setup-helm@v4

      - name: Render App-of-Apps Helm chart
        if: steps.app.outputs.mode == 'helm'
        env:
          APP_PATH: ${{ steps.app.outputs.app_path }}
          ENV_VALUE_FILE: ${{ inputs.env_value_file }}
        run: |
          set -euo pipefail

          render_branch() {
            local branch_dir="$1"
            local chart_dir="${branch_dir}/${APP_PATH}"
            local output_dir="${branch_dir}/.argocd-diff-preview"
            local output_file="${output_dir}/rendered-applications.yaml"
            mkdir -p "${output_dir}"

            local -a value_args

            if [ -f "${chart_dir}/values.yaml" ]; then
              value_args+=("-f" "${chart_dir}/values.yaml")
            fi

            if [ -n "${ENV_VALUE_FILE}" ]; then
              local env_file="${ENV_VALUE_FILE#/}"
              local chart_env_values="${chart_dir}/${env_file}"
              local root_env_values="${branch_dir}/${env_file}"

              if [ -f "${chart_env_values}" ]; then
                value_args+=("-f" "${chart_env_values}")
              elif [ -f "${root_env_values}" ]; then
                value_args+=("-f" "${root_env_values}")
              else
                echo "Missing env_value_file in chart path or repo root: ${ENV_VALUE_FILE}"
                exit 1
              fi
            fi

            echo "Rendering ${chart_dir} -> ${output_file}"
            helm template "argocd-diff-preview" "${chart_dir}" "${value_args[@]}" > "${output_file}"
          }

          render_branch "${GITHUB_WORKSPACE}/main"
          render_branch "${GITHUB_WORKSPACE}/pull-request"

      - name: Prepare Argo CD repo credentials
        env:
          REPO_URL: https://github.com/${{ steps.meta.outputs.repository }}
          REPO_TOKEN: ${{ secrets.repo_read_token || github.token }}
        run: |
          mkdir -p secrets

          cat > secrets/secret.yaml <<EOF_SECRET
          apiVersion: v1
          kind: Secret
          metadata:
            name: private-repo
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repo-creds
          stringData:
            url: ${REPO_URL}
            password: ${REPO_TOKEN}
            username: not-used
          EOF_SECRET

      - name: Generate Diff
        run: |
          mkdir -p output

          docker run \
            --network=host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/main:/base-branch" \
            -v "${{ github.workspace }}/pull-request:/target-branch" \
            -v "${{ github.workspace }}/output:/output" \
            -v "${{ github.workspace }}/secrets:/secrets" \
            -e BASE_BRANCH="${{ inputs.base_ref }}" \
            -e TARGET_BRANCH="${{ steps.meta.outputs.target_ref }}" \
            -e REPO="${{ steps.meta.outputs.repository }}" \
            dagandersen/argocd-diff-preview:v0.2.1 \
            --file-regex "${{ steps.app.outputs.file_regex }}"

      - name: Post diff as comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          DIFF_PATH: ${{ github.workspace }}/output/diff.md
        with:
          script: |
            const fs = require("node:fs");

            const marker = "<!-- argocd-diff-preview -->";
            const issue_number = Number(process.env.PR_NUMBER);
            const filePath = process.env.DIFF_PATH;

            if (!fs.existsSync(filePath)) {
              core.setFailed(`Diff file not found: ${filePath}`);
              return;
            }

            const diffBody = fs.readFileSync(filePath, "utf8").trim();
            if (!diffBody) {
              core.setFailed("Diff file is empty.");
              return;
            }

            const body = `${marker}\n${diffBody}`;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = [...comments]
              .reverse()
              .find((comment) => comment.user?.login === "github-actions[bot]" && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
              core.info(`Created comment ${created.data.id}`);
            }
