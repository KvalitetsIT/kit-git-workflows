name: Argo CD Diff Preview (reusable)
# ------------------------------------------------------------------------------------
# Argo CD diff preview for pull requests
#
# Simple usage (per repo)
#
# 1) Call this reusable workflow from a workflow triggered by pull_request
# 2) Optional: override values_file_regex when not targeting prod
# 3) Optionally provide secret repo_read_token for private repos
# 4) Optionally provide secret repo_ssh_private_key when child apps use SSH repo URLs
#
# What it does
# - Checks out:
#     - base branch from PR context into ./main
#     - pull request merge ref into ./pull-request
# - Auto-detects mode:
#     - Helm App-of-Apps (Chart.yaml found): tries to pre-render chart in both branches
#     - Manifests folder: scans YAML files under detected path
#     - If no clear path is found: scans all YAML files
# - Helm rendering automatically uses:
#     - values.yaml + all values files matching values_file_regex
#     - Default values_file_regex targets prod files
# - Uses --traverse-app-of-apps to discover child applications at runtime
# - Creates Argo CD repo-creds secret manifest in ./secrets for private repo access
# - Runs dagandersen/argocd-diff-preview and writes markdown output to ./output/diff.md
# - Creates or updates a PR comment with the diff markdown
# ------------------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      values_file_regex:
        description: "Regex used to include values files for Helm rendering (matches basename). Default selects prod files."
        required: false
        type: string
        default: "^values-.*prod.*\\.ya?ml$"
    secrets:
      repo_read_token:
        description: "Optional token with read access to repo for private git/helm resources"
        required: false
      repo_ssh_private_key:
        description: "Optional SSH private key for repositories referenced with SSH URLs (e.g. git@github.com:org/repo.git)"
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(context.payload.pull_request?.number) || 0;

            if (!prNumber) {
              core.setFailed(
                "No pull request number found. Run from a pull_request-triggered caller workflow."
              );
              return;
            }

            const targetRef = `refs/pull/${prNumber}/merge`;
            const repository = `${context.repo.owner}/${context.repo.repo}`;
            const baseRef = context.payload.pull_request?.base?.ref || "main";

            core.setOutput("pr_number", String(prNumber));
            core.setOutput("target_ref", targetRef);
            core.setOutput("repository", repository);
            core.setOutput("base_ref", baseRef);

      - name: Checkout pull request merge ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.target_ref }}
          path: pull-request

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.base_ref }}
          path: main

      - name: Resolve app mode and file filter
        id: app
        run: |
          set -euo pipefail

          APP_PATH=""

          if [ -z "${APP_PATH}" ]; then
            # Try common App-of-Apps locations first
            for candidate in "deployment/apps/infrastructure" "apps/infrastructure" "argocd"; do
              if [ -d "${GITHUB_WORKSPACE}/main/${candidate}" ] && [ -d "${GITHUB_WORKSPACE}/pull-request/${candidate}" ]; then
                APP_PATH="${candidate}"
                echo "Auto-detected app_path=${APP_PATH} from common locations"
                break
              fi
            done
          fi

          if [ -z "${APP_PATH}" ]; then
            # Try auto-detecting a single Helm chart path
            mapfile -t chart_candidates < <(
              find "${GITHUB_WORKSPACE}/main" -type f -name Chart.yaml \
                | sed "s#^${GITHUB_WORKSPACE}/main/##" \
                | sed 's#/Chart.yaml$##' \
                | while IFS= read -r rel; do
                    if [ -f "${GITHUB_WORKSPACE}/pull-request/${rel}/Chart.yaml" ]; then
                      printf '%s\n' "${rel}"
                    fi
                  done \
                | sort
            )

            if [ "${#chart_candidates[@]}" -eq 1 ]; then
              APP_PATH="${chart_candidates[0]}"
              echo "Auto-detected unique Helm chart app_path=${APP_PATH}"
            fi
          fi

          if [ -z "${APP_PATH}" ]; then
            echo "No app_path provided and no unique chart path auto-detected. Falling back to scanning all YAML files."
            echo "mode=auto" >> "$GITHUB_OUTPUT"
            echo "path_file_regex=^.*\\.ya?ml$" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAIN_PATH="${GITHUB_WORKSPACE}/main/${APP_PATH}"
          PR_PATH="${GITHUB_WORKSPACE}/pull-request/${APP_PATH}"

          if [ ! -e "${MAIN_PATH}" ]; then
            echo "app_path not found in base branch checkout: ${APP_PATH}"
            exit 1
          fi

          if [ ! -e "${PR_PATH}" ]; then
            echo "app_path not found in pull-request checkout: ${APP_PATH}"
            exit 1
          fi

          echo "app_path=${APP_PATH}" >> "$GITHUB_OUTPUT"
          ESCAPED_APP_PATH="$(printf '%s' "${APP_PATH}" | sed -e 's/[][(){}.^$*+?|\\]/\\&/g')"
          echo "path_file_regex=^${ESCAPED_APP_PATH}/.*\\.ya?ml$" >> "$GITHUB_OUTPUT"

          if [ -f "${MAIN_PATH}/Chart.yaml" ] && [ -f "${PR_PATH}/Chart.yaml" ]; then
            echo "mode=helm" >> "$GITHUB_OUTPUT"
            echo "Detected App-of-Apps Helm chart at ${APP_PATH}"
          else
            if [ ! -d "${MAIN_PATH}" ] || [ ! -d "${PR_PATH}" ]; then
              echo "Expected a directory at app_path for manifest mode: ${APP_PATH}"
              exit 1
            fi

            echo "mode=manifests" >> "$GITHUB_OUTPUT"
            echo "Detected manifest folder mode under ${APP_PATH}"
          fi

      - name: Setup Helm
        if: steps.app.outputs.mode == 'helm'
        uses: azure/setup-helm@v4

      - name: Render App-of-Apps Helm chart (best effort)
        id: render_helm
        if: steps.app.outputs.mode == 'helm'
        env:
          APP_PATH: ${{ steps.app.outputs.app_path }}
          VALUES_FILE_REGEX: ${{ inputs.values_file_regex }}
        run: |
          set -euo pipefail

          render_branch() {
            local branch_dir="$1"
            local chart_dir="${branch_dir}/${APP_PATH}"
            local output_dir="${branch_dir}/.argocd-diff-preview"
            local output_file="${output_dir}/rendered-applications.yaml"
            mkdir -p "${output_dir}"

            echo "Resolving Helm dependencies in ${chart_dir}"
            helm dependency build "${chart_dir}" || helm dependency update "${chart_dir}"

            local base_values="${chart_dir}/values.yaml"
            local -a matching_overrides=()
            local values_regex="${VALUES_FILE_REGEX:-^values-.*prod.*\\.ya?ml$}"

            mapfile -t matching_overrides < <(
              find "${chart_dir}" -maxdepth 1 -type f \( -name 'values-*.yaml' -o -name 'values-*.yml' \) \
                | while IFS= read -r file; do
                    local_name="$(basename "${file}")"
                    if printf '%s\n' "${local_name}" | grep -Eiq "${values_regex}"; then
                      printf '%s\n' "${file}"
                    fi
                  done \
                | sort
            )

            local -a value_args=()
            if [ -f "${base_values}" ]; then
              value_args+=("-f" "${base_values}")
            fi
            for override in "${matching_overrides[@]}"; do
              value_args+=("-f" "${override}")
            done

            if [ "${#matching_overrides[@]}" -eq 0 ]; then
              echo "No values files matched regex '${values_regex}' in ${chart_dir}. Rendering with values.yaml only."
            else
              echo "Using values regex '${values_regex}' with ${#matching_overrides[@]} matching file(s)."
            fi

            echo "Rendering ${chart_dir} -> ${output_file}"
            helm template \
              "argocd-diff-preview" \
              "${chart_dir}" \
              --dependency-update \
              "${value_args[@]}" \
              > "${output_file}"
          }

          main_status=0
          pr_status=0

          render_branch "${GITHUB_WORKSPACE}/main" || main_status=$?
          render_branch "${GITHUB_WORKSPACE}/pull-request" || pr_status=$?

          if [ "${main_status}" -eq 0 ] && [ "${pr_status}" -eq 0 ]; then
            echo "rendered=true" >> "$GITHUB_OUTPUT"
          else
            echo "Helm pre-render failed in at least one branch. Falling back to repository scan + --traverse-app-of-apps."
            echo "rendered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Argo CD repo credentials
        env:
          REPO_URL: https://github.com/${{ steps.meta.outputs.repository }}
          REPO_TOKEN: ${{ secrets.repo_read_token || github.token }}
          REPO_SSH_PRIVATE_KEY: ${{ secrets.repo_ssh_private_key }}
        run: |
          mkdir -p secrets

          cat > secrets/secret.yaml <<EOF_SECRET
          apiVersion: v1
          kind: Secret
          metadata:
            name: private-repo
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repo-creds
          stringData:
            url: ${REPO_URL}
            password: ${REPO_TOKEN}
            username: not-used
          EOF_SECRET

          mapfile -t ssh_hosts < <(
            grep -R -h -E --include='*.yaml' --include='*.yml' 'repoURL:[[:space:]]*(git@|ssh://git@)' "${GITHUB_WORKSPACE}/main" "${GITHUB_WORKSPACE}/pull-request" \
              | awk '
                  {
                    value = $0
                    sub(/.*repoURL:[[:space:]]*/, "", value)
                    gsub(/"/, "", value)
                    if (match(value, /^git@([^:\/]+)[:\/]/, m)) {
                      print m[1]
                    } else if (match(value, /^ssh:\/\/git@([^:\/]+)(:[0-9]+)?\//, m)) {
                      print m[1]
                    }
                  }
                ' \
              | sort -u
          )

          if [ "${#ssh_hosts[@]}" -gt 0 ] && [ -z "${REPO_SSH_PRIVATE_KEY}" ]; then
            echo "::error::Found SSH-based repoURL entries, but repo_ssh_private_key is not provided."
            echo "::error::Add 'repo_ssh_private_key' in caller workflow secrets mapping (or use secrets: inherit)."
            printf '::error::Detected SSH hosts: %s\n' "$(IFS=,; echo "${ssh_hosts[*]}")"
            exit 1
          fi

          write_ssh_repo_cred() {
            local secret_name="$1"
            local secret_url="$2"
            local secret_file="secrets/${secret_name}.yaml"

            cat > "${secret_file}" <<EOF_SSH_SECRET
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${secret_name}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repo-creds
          stringData:
            url: ${secret_url}
            sshPrivateKey: |
          EOF_SSH_SECRET

            printf '%s\n' "${REPO_SSH_PRIVATE_KEY}" | sed 's/^/    /' >> "${secret_file}"
          }

          if [ -n "${REPO_SSH_PRIVATE_KEY}" ]; then
            if [ "${#ssh_hosts[@]}" -eq 0 ]; then
              default_host="$(printf '%s' "${REPO_URL}" | sed -E 's#https?://([^/]+)/?.*#\1#')"
              ssh_hosts=("${default_host}")
              echo "No SSH repoURL found during scan. Adding SSH repo-creds for default host: ${default_host}"
            fi

            for host in "${ssh_hosts[@]}"; do
              safe_host="$(printf '%s' "${host}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
              if [ -z "${safe_host}" ]; then
                safe_host="host"
              fi

              write_ssh_repo_cred "private-repo-ssh-${safe_host}-scp" "git@${host}:"
              write_ssh_repo_cred "private-repo-ssh-${safe_host}-url" "ssh://git@${host}/"
              write_ssh_repo_cred "private-repo-ssh-${safe_host}-url-22" "ssh://git@${host}:22/"
            done

            echo "Added SSH repo-creds secrets for host(s): $(IFS=,; echo "${ssh_hosts[*]}")"
          fi

      - name: Generate Diff
        run: |
          mkdir -p output

          FILE_REGEX="${{ steps.app.outputs.path_file_regex }}"
          if [ "${{ steps.app.outputs.mode }}" = "helm" ] && [ "${{ steps.render_helm.outputs.rendered }}" = "true" ]; then
            FILE_REGEX="^\\.argocd-diff-preview/rendered-applications\\.yaml$"
          fi

          docker run \
            --network=host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/main:/base-branch" \
            -v "${{ github.workspace }}/pull-request:/target-branch" \
            -v "${{ github.workspace }}/output:/output" \
            -v "${{ github.workspace }}/secrets:/secrets" \
            -e BASE_BRANCH="${{ steps.meta.outputs.base_ref }}" \
            -e TARGET_BRANCH="${{ steps.meta.outputs.target_ref }}" \
            -e REPO="${{ steps.meta.outputs.repository }}" \
            dagandersen/argocd-diff-preview:v0.2.2 \
            --render-method repo-server-api \
            --traverse-app-of-apps \
            --file-regex "${FILE_REGEX}"

      - name: Post diff as comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          DIFF_PATH: ${{ github.workspace }}/output/diff.md
        with:
          script: |
            const fs = require("node:fs");

            const marker = "<!-- argocd-diff-preview -->";
            const issue_number = Number(process.env.PR_NUMBER);
            const filePath = process.env.DIFF_PATH;

            if (!fs.existsSync(filePath)) {
              core.setFailed(`Diff file not found: ${filePath}`);
              return;
            }

            const diffBody = fs.readFileSync(filePath, "utf8").trim();
            if (!diffBody) {
              core.setFailed("Diff file is empty.");
              return;
            }

            const body = `${marker}\n${diffBody}`;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = [...comments]
              .reverse()
              .find((comment) => comment.user?.login === "github-actions[bot]" && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
              core.info(`Created comment ${created.data.id}`);
            }
