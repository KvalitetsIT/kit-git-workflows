name: Notify Slack about merged PRs missing production release labels (reusable)

on:
  workflow_call:
    inputs:
      target_branch:
        description: "Base/target branch to check (e.g. main/master/release)"
        type: string
        required: false
        default: "main"
      created_after:
        description: "Only include PRs created after this date (YYYY-MM-DD)"
        type: string
        required: false
        default: "2025-12-03"
      merged_days_ago:
        description: "Only include PRs merged more than this many days ago"
        type: number
        required: false
        default: 7
      label_tested:
        description: "Label indicating production release has been tested"
        type: string
        required: false
        default: "production release tested"
      label_no_impact:
        description: "Label indicating production release has no production impact"
        type: string
        required: false
        default: "production release no impact"
    secrets:
      SLACK_WEBHOOK_URL:
        description: "Slack Incoming Webhook URL"
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Find merged PRs missing production release labels
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const TARGET_BRANCH = `${{ inputs.target_branch }}`.trim() || "main";
            const CREATED_AFTER = `${{ inputs.created_after }}`.trim() || "2025-12-03";
            const MERGED_DAYS_AGO_RAW = `${{ inputs.merged_days_ago }}`.trim();
            const MERGED_DAYS_AGO = Number.parseInt(MERGED_DAYS_AGO_RAW, 10);

            const LABEL_TESTED = `${{ inputs.label_tested }}`.trim() || "production release tested";
            const LABEL_NO_IMPACT = `${{ inputs.label_no_impact }}`.trim() || "production release no impact";

            if (!Number.isFinite(MERGED_DAYS_AGO) || MERGED_DAYS_AGO < 0) {
              throw new Error(`Invalid merged_days_ago: "${MERGED_DAYS_AGO_RAW}"`);
            }

            // cutoff date for merged:< (older than MERGED_DAYS_AGO days)
            const cutoff = new Date(Date.now() - MERGED_DAYS_AGO * 24 * 60 * 60 * 1000);
            const yyyy = cutoff.getUTCFullYear();
            const mm = String(cutoff.getUTCMonth() + 1).padStart(2, "0");
            const dd = String(cutoff.getUTCDate()).padStart(2, "0");
            const mergedBefore = `${yyyy}-${mm}-${dd}`;

            const q = [
              `repo:${owner}/${repo}`,
              `is:pr`,
              `is:merged`,
              `base:${TARGET_BRANCH}`,
              `created:>${CREATED_AFTER}`,
              `merged:<${mergedBefore}`,
              `-label:"${LABEL_TESTED}"`,
              `-label:"${LABEL_NO_IMPACT}"`
            ].join(" ");

            core.info(`Search query: ${q}`);

            const results = [];
            let page = 1;

            while (true) {
              const resp = await github.rest.search.issuesAndPullRequests({
                q,
                per_page: 100,
                page
              });

              for (const item of resp.data.items) {
                if (!item.pull_request) continue;

                const labels = (item.labels || []).map(l => (typeof l === "string" ? l : l.name));

                // Extra guards (even though the query excludes them)
                if (labels.includes(LABEL_TESTED)) continue;
                if (labels.includes(LABEL_NO_IMPACT)) continue;

                results.push({
                  number: item.number,
                  title: item.title,
                  url: item.html_url,
                  author: item.user?.login ?? "unknown",
                  merged_at: item.closed_at
                });
              }

              if (resp.data.items.length < 100) break;
              page++;
              if (page > 10) break; // fail-safe
            }

            core.info(`Found ${results.length} PR(s)`);

            core.setOutput("count", String(results.length));
            core.setOutput("prs_json", JSON.stringify(results));
            core.setOutput("target_branch", TARGET_BRANCH);
            core.setOutput("created_after", CREATED_AFTER);
            core.setOutput("merged_days_ago", String(MERGED_DAYS_AGO));
            core.setOutput("label_tested", LABEL_TESTED);
            core.setOutput("label_no_impact", LABEL_NO_IMPACT);

      - name: Build Slack payload (valid JSON)
        id: slack
        if: steps.find.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const prs = JSON.parse(`${{ steps.find.outputs.prs_json }}`);

            const targetBranch = `${{ steps.find.outputs.target_branch }}`;
            const createdAfter = `${{ steps.find.outputs.created_after }}`;
            const mergedDaysAgo = `${{ steps.find.outputs.merged_days_ago }}`;
            const labelTested = `${{ steps.find.outputs.label_tested }}`;
            const labelNoImpact = `${{ steps.find.outputs.label_no_impact }}`;

            const lines = prs.slice(0, 50).map(pr =>
              `• <${pr.url}|#${pr.number}> — ${pr.title} (by ${pr.author})`
            );

            let text =
              `:warning: *PR’er targeting \`${targetBranch}\` oprettet efter ${createdAfter} som har været merged i > ${mergedDaysAgo} dage og mangler label \`${labelTested}\`* ` +
              `(og er ikke markeret som \`${labelNoImpact}\`)\n` +
              lines.join("\n");

            if (prs.length > 50) {
              text += `\n…og ${prs.length - 50} flere (viser max 50).`;
            }

            core.setOutput("payload", JSON.stringify({ text }));

      - name: Send to Slack (webhook)
        if: steps.find.outputs.count != '0'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: ${{ steps.slack.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
